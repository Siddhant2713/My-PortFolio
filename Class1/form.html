<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Application Form</h1>
    <form>
        <label>Full Name</label>
        <input type="text" name="fullName" >
        <label>Email</label>
        <input type="email" name="email">
        <label>Mobile number</label>
        <input type="tel" name="mobile" pattern="[0-9]{10}"> 
        <label>Date of Birth</label>
        <input type="date" name="dob" min="1965-01-01" max="2011-01-01">
        <label>Address</label>
        <textarea name="address"></textarea>
        <label>Age</label>
        <input type="number" name="age" >
        <p>Services</p>
        <label><input type="checkbox" name="services" value="service1"> Service 1</label><br>
        <label><input type="checkbox" name="services" value="service2"> Service 2</label><br>
        <label><input type="checkbox" name="services" value="service3"> Service 3</label><br>

        <p>Gender:</p>
        <label><input type="radio" name="gender" value="male"> Male</label><br>
        <label><input type="radio" name="gender" value="female"> Female</label><br>
        <label><input type="radio" name="gender" value="other"> Other</label><br>

        <label>Password</label>
        <input type="password" name="password">

        <label>Upload Photo</label>
        <input type="file">
        <label>Blood group</label>
        <select name="country" id="">
            <option value="india">A+</option>
            <option value="usa">B+</option>
            <option value="uk">C+</option>
        </select>
        <input type="submit" value="Submit">


    </form>
    
</body>
</html>
