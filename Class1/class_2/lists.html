<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>

<body>
    <!-- Unordered list -->
    <h1>Shopping List</h1>
    <ul type="triangle">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>

    <!-- Ordered list -->
    <h1>Routine</h1>

    <ol type="i">
        <li>Waking up</li>
        <li>Organising bed</li>
        <li>Brushing teeth</li>
    </ol>

    <!-- Descriptive list -->
    <h1>Grocery List</h1>
    <dl>
        <dt>Fruits</dt>
        <dd>Apples, Bananas, Oranges</dd>
        <dt>Vegetables</dt>
        <dd>Carrots, Broccoli, Spinach</dd>
    </dl>
</body>

</html>
